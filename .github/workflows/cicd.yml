name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  DOCKER_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/nodejs-cicd-app

jobs:
  test:
    name: Install & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:latest
            ${{ env.DOCKER_IMAGE }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest'

      - name: Configure kubectl
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Check cluster connection
        run: kubectl get nodes

      - name: Update image in deployment
        run: |
          sed -i "s|YOUR_DOCKERHUB_USERNAME/nodejs-cicd-app:latest|${{ env.DOCKER_IMAGE }}:sha-${{ github.sha }}|g" k8s/deployment.yaml

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/nodejs-app --timeout=120s

      - name: Verify pods are running
        run: |
          kubectl get pods -l app=nodejs-app
          kubectl get services

      - name: Rollback on failure
        if: failure()
        run: |
          echo "Deployment failed! Attempting rollback..."
          REVISION=$(kubectl rollout history deployment/nodejs-app 2>/dev/null | tail -2 | head -1 | awk '{print $1}')
          if [ -n "$REVISION" ] && [ "$REVISION" -gt "1" ]; then
            kubectl rollout undo deployment/nodejs-app
            echo "Rollback complete"
          else
            echo "No previous revision to rollback to"
          fi

  cleanup:
    name: Cleanup Old Docker Images
    runs-on: ubuntu-latest
    needs: deploy
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Delete old images keep last 5
        run: |
          TOKEN=$(curl -s -H "Content-Type: application/json" \
            -X POST -d '{"username":"${{ secrets.DOCKERHUB_USERNAME }}","password":"${{ secrets.DOCKERHUB_TOKEN }}"}' \
            https://hub.docker.com/v2/users/login/ | jq -r .token)
          TAGS=$(curl -s \
            -H "Authorization: JWT $TOKEN" \
            "https://hub.docker.com/v2/repositories/${{ secrets.DOCKERHUB_USERNAME }}/nodejs-cicd-app/tags/?page_size=100" \
            | jq -r '.results | sort_by(.last_updated) | reverse | .[5:][].name')
          for TAG in $TAGS; do
            echo "Deleting tag: $TAG"
            curl -s -X DELETE \
              -H "Authorization: JWT $TOKEN" \
              "https://hub.docker.com/v2/repositories/${{ secrets.DOCKERHUB_USERNAME }}/nodejs-cicd-app/tags/$TAG/"
          done
          echo "Cleanup complete. Kept latest 5 images."
