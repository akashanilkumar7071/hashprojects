name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  DOCKER_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/nodejs-cicd-app

jobs:
  # ─── JOB 1: Test ───────────────────────────────────────────
  test:
    name: Install & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/

  # ─── JOB 2: Build & Push Docker Image ──────────────────────
  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_IMAGE }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── JOB 3: Deploy to Kubernetes ───────────────────────────
  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest'

      - name: Configure kubectl (EC2 kubeconfig)
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Save current deployment (for rollback)
        id: save_deployment
        run: |
          kubectl get deployment nodejs-app -o yaml > /tmp/previous-deployment.yaml 2>/dev/null || echo "No existing deployment"
          CURRENT_IMAGE=$(kubectl get deployment nodejs-app -o jsonpath='{.spec.template.spec.containers[0].image}' 2>/dev/null || echo "none")
          echo "current_image=$CURRENT_IMAGE" >> $GITHUB_OUTPUT

      - name: Update image in deployment manifest
        run: |
          IMAGE_TAG="${{ env.DOCKER_IMAGE }}:sha-${{ github.sha }}"
          sed -i "s|YOUR_DOCKERHUB_USERNAME/nodejs-cicd-app:latest|$IMAGE_TAG|g" k8s/deployment.yaml
          echo "Deploying image: $IMAGE_TAG"

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml

      - name: Wait for rollout
        id: rollout
        run: |
          kubectl rollout status deployment/nodejs-app --timeout=120s

      - name: Verify deployment health
        run: |
          kubectl get pods -l app=nodejs-app
          kubectl get services

      - name: Rollback on failure
        if: failure() && steps.save_deployment.outputs.current_image != 'none'
        run: |
          echo "❌ Deployment failed! Rolling back..."
          kubectl rollout undo deployment/nodejs-app
          kubectl rollout status deployment/nodejs-app --timeout=60s
          echo "✅ Rollback complete. Reverted to previous version."

      - name: Notify deployment result
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ Deployment successful!"
          else
            echo "❌ Deployment failed - rollback was triggered"
          fi
cleanup:
    name: Cleanup Old Docker Images
    runs-on: ubuntu-latest
    needs: deploy
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Clean up old images
        run: |
          TOKEN=$(curl -s -H "Content-Type: application/json" \
            -X POST -d '-d '{"username":"${{ secrets.DOCKERHUB_USERNAME }}","password":"${{ secrets.DOCKERHUB_TOKEN }}"}' \
            https://hub.docker.com/v2/users/login/ | jq -r .token)

          curl -s -H "Authorization: JWT $TOKEN" \
            "https://hub.docker.com/v2/repositories/akash7071/nodejs-cicd-app/tags/?page_size=100" \
            | jq -r '.results[5:][].name' \
            | xargs -I {} curl -X DELETE \
              -H "Authorization: JWT $TOKEN" \
              "https://hub.docker.com/v2/repositories/akash7071/nodejs-cicd-app/tags/{}"
```


